global:
  image:
    # -- If defined, a repository applied to all Argo CD deployments
    repository: 941284018955.dkr.ecr.il-central-1.amazonaws.com/argocd
    # -- Overrides the global Argo CD image tag whose default is the chart appVersion
    tag: "v3.3.9"

configs:
  cm:
    create: true
    exec.enabled: true

  params:
    create: true
    server.insecure: true

dex:
  enabled: false

redis:
  enabled: true
  image:
    repository: 941284018955.dkr.ecr.il-central-1.amazonaws.com/docker/library/redis
    
server:
  image:
    repository: "941284018955.dkr.ecr.il-central-1.amazonaws.com/argocd"
    tag: "v3.3.9"
  replicas: 1
  extraArgs:
    - --rootpath=/argo-cd
    - --insecure
    - --enable-gzip

  service:
    type: NodePort
    nodePortHttp: 30080
    nodePortHttps: 30443
    
  ingress:
    enabled: true
    hostname: "infra.testmpr.aws2.rafael.co.il"
    ingressClassName: "nginx"
    path: /argo-cd
    tls:
      - hosts:
        - "infra.testmpr.aws2.rafael.co.il"
        secretName: testmpr-aws-wildcard-cert
