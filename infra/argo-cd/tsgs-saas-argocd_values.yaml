global:
  image:
    repository: artifactory.rafael.co.il:6001/argocd
    tag: "v2.11.7"
    imagePullPolicy: IfNotPresent
  imagePullSecrets: 
  - name: tsinf-registry

  tolerations:
    - key: "statefulset/special-taint"
      operator: "Equal"

## Argo Configs
configs:
  cm:
    create: true
    exec.enabled: true

  params:
    create: true
    server.insecure: true

  repositories:
      tsgs-infra-argocd:
        url: https://gitlab.rafael.co.il/tsgs/cloudops/tsgs-infra-argocd.git
        password: zZCvnF1E22Xb6VZR-NRS
        username: svc_tsgs_gitlab_pat
      tsgs-infra:
        url: https://gitlab.rafael.co.il/tsgs/cloudops/tsgs-infra.git
        password: zZCvnF1E22Xb6VZR-NRS
        username: svc_tsgs_gitlab_pat


## Dex
dex:
  enabled: false

## Redis
redis:
  enabled: true
  image:
    repository: artifactory.rafael.co.il:6001/public.ecr.aws/docker/library/redis
    tag: 7.2.4-alpine
    imagePullPolicy: ""
  imagePullSecrets:
      - name: "tsinf-registry"

## Server
server:
  replicas: 3
  extraArgs:
    - --rootpath=/argo-cd
    - --insecure
    - --enable-gzip

  # service:
  #   type: ClusterIP
  service:
    type: NodePort
    nodePortHttp: 30080
    nodePortHttps: 30443

  ingress:
    enabled: true
    hostname: "infra.tsgs.aws2.rafael.co.il"
    ingressClassName: "nginx"
    path: /argo-cd

