{{- if and (index .Values "kafka-mcp" "enabled") (index .Values "agents" "kafka-agent" "enabled") }}
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: {{ index .Values "agents" "kafka-agent" "name" | default "kafka-agent" }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "mcp-tools.labels" . | nindent 4 }}
    app.kubernetes.io/component: kafka-agent
spec:
  description: {{ index .Values "agents" "kafka-agent" "description" | default "Kafka assistant agent (via MCP)" }}
  type: Declarative
  declarative:
    modelConfig: {{ index .Values "agents" "kafka-agent" "modelConfig" | default "vllm-gpt" }}
    stream: true
    {{- with index .Values "agents" "kafka-agent" "context" }}
    context:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    {{- with index .Values "agents" "kafka-agent" "deployment" }}
    deployment:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    systemMessage: |
      {{- index .Values "agents" "kafka-agent" "systemMessage" | nindent 6 }}
    tools:
    - type: McpServer
      mcpServer:
        apiGroup: kagent.dev
        kind: RemoteMCPServer
        name: {{ include "mcp-tools.kafka-mcp.remoteName" . }}
        toolNames:
        {{- toYaml (index .Values "agents" "kafka-agent" "toolNames") | nindent 8 }}
{{- end }}
