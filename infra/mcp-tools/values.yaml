# Default values for mcp-tools
# To add a new MCP, just add an entry under "mcps" — no template or Chart.yaml changes needed.
# Agents are defined as individual templates under templates/agents/.

nameOverride: ""
fullnameOverride: ""

# ==============================================================================
# MCP SERVERS
# ==============================================================================
# Each key under "mcps" creates: Deployment, Service, ConfigMap, ServiceAccount,
# RemoteMCPServer, and optionally a Secret.
mcps:
  # ============================================================================
  # ELASTICSEARCH MCP
  # ============================================================================
  elasticsearch-mcp:
    enabled: true
    replicas: 1

    image:
      registry: ronbutbul135
      repository: elasticsearch-mcp-service
      pullPolicy: Always
      tag: "20260212-172526-36c9253b"

    service:
      type: ClusterIP
      port: 8000

    # Environment variables injected via ConfigMap
    env:
      ES_MCP_CONNECTION_STRING: "http://elastic-kibana-elasticsearch:9200"

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    # Optional secret data (uncomment to use)
    # secretData:
    #   ES_API_KEY: "my-api-key"

    serviceAccount:
      create: true
      annotations: {}

    securityContext: {}
    tolerations: []
    nodeSelector: {}
    volumes: []
    volumeMounts: []
    extraConfig: {}

  # ============================================================================
  # MONGODB MCP
  # ============================================================================
  mongodb-mcp:
    enabled: true
    replicas: 1

    image:
      registry: 941284018955.dkr.ecr.il-central-1.amazonaws.com
      repository: mongodb-mcp-service
      pullPolicy: Always
      tag: "20260202-131744-c6772109"

    service:
      type: ClusterIP
      port: 8000

    env:
      MDB_MCP_CONNECTION_STRING: "mongodb://localhost:27017"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    serviceAccount:
      create: true
      annotations: {}

    securityContext: {}
    tolerations: []
    nodeSelector: {}
    volumes: []
    volumeMounts: []
    extraConfig: {}

  # ============================================================================
  # KAFKA MCP
  # ============================================================================
  kafka-mcp:
    enabled: true
    replicas: 1

    image:
      registry: 941284018955.dkr.ecr.il-central-1.amazonaws.com
      repository: mcp-kafka-service
      pullPolicy: Always
      tag: "20260203-110114-15951fd6"

    service:
      type: ClusterIP
      port: 8000

    env:
      KAFKA_BOOTSTRAP_SERVERS: "http://localhost:9092"
      KAFKA_ADMIN_SERVERS: "http://localhost:9093"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8000"

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    serviceAccount:
      create: true
      annotations: {}

    securityContext: {}
    tolerations: []
    nodeSelector: {}
    volumes: []
    volumeMounts: []
    extraConfig: {}

# ==============================================================================
# AGENTS
# ==============================================================================
# Agent enable flags. The agent templates live under templates/agents/.
agents:
  elasticsearch:
    enabled: true
    modelConfig: "vllm-gpt"
  mongodb:
    enabled: true
    modelConfig: "vllm-gpt"
  kafka:
    enabled: true
    modelConfig: "vllm-gpt"
