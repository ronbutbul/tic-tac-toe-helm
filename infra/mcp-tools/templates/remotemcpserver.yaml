{{- range $key, $mcp := .Values.mcps }}
{{- if $mcp.enabled }}
{{- $resourceName := include "mcp-tools.resourceName" (dict "releaseName" $.Release.Name "mcpKey" $key) }}
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: {{ $resourceName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "mcp-tools.mcpLabels" (dict "chartName" $.Chart.Name "chartVersion" $.Chart.Version "mcpKey" $key "releaseName" $.Release.Name "releaseService" $.Release.Service) | nindent 4 }}
spec:
  description: {{ default (printf "%s MCP server" $key) $mcp.description }}
  protocol: {{ default "STREAMABLE_HTTP" $mcp.protocol }}
  sseReadTimeout: {{ default "5m0s" $mcp.sseReadTimeout }}
  terminateOnClose: {{ default true $mcp.terminateOnClose }}
  timeout: {{ default "30s" $mcp.timeout }}
  url: {{ printf "http://%s.%s:%d/mcp" $resourceName $.Release.Namespace ($mcp.service.port | int) }}
{{- end }}
{{- end }}
